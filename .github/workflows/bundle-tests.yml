# Bundle unit tests — Oteny's marketable-Talent content tests. talents.git is now the
# canonical home of the marketable Talent bundles (the D146 cutover), so their unit tests
# (SQL DDL idempotency, the cron/preflight/settle scripts, PII-clean, shipped-selfcheck-
# matches-canonical, routing signatures) live + run HERE, not in the hermeshost control-
# plane repo. (talent-lint.yml is the separate, copyable author-gate workflow.)
name: Bundle tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install pytest pyyaml

      - name: Run the marketable-Talent unit tests
        run: PYTHONPATH=tests python -m pytest tests/ -q

      - name: Run behavioral scenarios (offline mock backend)
        run: |
          set -euo pipefail
          shopt -s nullglob
          scenarios=(skills/*/tests/scenarios/*.yaml)
          if [ ${#scenarios[@]} -eq 0 ]; then
            echo "No behavioral scenarios (skills/*/tests/scenarios/*.yaml) to run."
            exit 0
          fi
          echo "Running ${#scenarios[@]} scenario(s) on the mock backend..."
          python skills/_shared/scripts/run_scenario.py --backend mock "${scenarios[@]}"
