[project]
name = "oteny"
version = "0.1.0"
description = "Oteny author CLI — account-key Talent dev loop (test / traces / lint / …)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "PyYAML>=6.0,<7",
]

[project.optional-dependencies]
dev = ["pytest>=8.3,<9"]

[project.scripts]
oteny = "oteny.cli:main"
oteny-talent-lint = "oteny.cli:lint_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oteny"]

[tool.pytest.ini_options]
testpaths = ["tests"]
