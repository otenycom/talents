# Travel-talent — the sellable Talent spec (a Talent = persona + skills, one of several
# loadable on a tenant's OtenyBot). Composition is config, not SOUL surgery: drop the
# skill files + merge the routing declaration. Model tier is GLOBAL (set on the agent),
# not per-talent. The internal slug (bot:) and the runtime group name (routing.channel)
# stay as-is — internal identifiers, never user-facing.
bot: oteny-travel-talent
display_name: TravelBot
tagline: "Your private travel concierge — plan, route, split costs, watch your flights. Never books or pays."
# The landing-page "what it does" body (oteny.com/bots/travel) — plain paragraphs, escaped,
# split on blank lines (hh.talent.long_md → store.py _paragraphs). House voice: lead with the
# value, plain English, honest. Re-seeded from this file on every catalog seed.
long_md: |
  Tell TravelBot where you're going and it plans the trip, maps the way, and keeps watch
  while you travel — in a private chat, or in a group chat with the people you're going with.

  Ask "when's my next tram?" and it reads the live board, not a printed timetable. In the
  Netherlands it shows the real countdown with the actual delay, the platform (spoor) — and
  warns you the moment it changes ("now spoor 9, not 5") — plus any service alert, like a
  replacement bus. Everywhere else you get Google's live departures. Every answer comes with a
  tap-to-open map link, so you're never stuck on a number that's quietly wrong.

  Booked a flight? Paste the number and it tracks the status, gate, terminal and delay, and
  pings the chat the moment something moves. If an EU flight is cancelled or badly delayed, it
  even drafts your EU261 compensation claim.

  On a group trip, add it to the group: it keeps everyone's plan in sync, tracks who paid for
  what, and settles up at the end — greeting each traveller by name. It surfaces options and
  links but never books or pays for you, and visa, entry and health answers are advisory —
  always confirm with the official source.
version: 1.8.0   # Talent semver — a label over the delivered commit; bump on every change,
                 # MINOR/MAJOR when migrations.yaml gains an id (lint-enforced).
                 # 1.1.0: deeplink-first transit (maplink.py) + anti-grind/anti-fabrication
                 # guardrails + OVpay check-out reminder. Behavior added, no new migration id.
                 # 1.2.0: in-chat Static-Maps route image (travel static_map=true) + forwarded
                 # e-ticket intake → auto-filled booking (ticket-intake.md, national-ticket
                 # rules) + the broker-cache reuse nudge. Behavior added, no new migration id.
                 # 1.3.0: live departures board (travel action=departures, Google alternatives,
                 # international) + times already localized (no LLM tz-math) + cite-or-stand-down
                 # discipline (honor tool fallback_hint; uncited grounding = unverified).
                 # 1.3.1: live-E2E fix — forbid "enriching" a structured transit/departures answer
                 # with a grounded plan call for the same journey (the #1 fabrication source: it
                 # invented a fake platform closure); grounding never confirms a closure/platform.
                 # 1.3.2: live-E2E fix #2 — an explicit "any delays?" made the model web_search
                 # "storingen" and assert planned-works/dates as fact; rule now bans web_search for
                 # delays/disruptions-as-fact (no live delay feed) → hand the board + live 9292/Maps.
                 # 1.3.3: live-E2E fix #3 — the reference files (disruption.md) still told the model
                 # "web_search = a live source", overriding the SKILL.md rule; closed that loophole
                 # at the source (structured-only confirmation; flights are the scoped exception).
                 # 1.4.0: Phase 3 — structured flight status/gate via the new `flight_status` tool
                 # (AeroDataBox); flights' status/gate/delay no longer ride grounding; EU261 claim
                 # calc wired to the structured delay_min + distance_km. Behavior added, no migration.
                 # 1.4.1: live-E2E — flight_status is the complete flight answer; forbid enriching
                 # it with a travel/plan call (it added a 'typical D-gate' + aircraft guess); null gate
                 # => 'not yet assigned'. Behavior added, no migration.
                 # 1.5.0: CORRECTION — v1.3.2-1.4.1 wrongly told the model NOT to web_search transit
                 # disruptions, on an UNVERIFIED premise that they're hallucinations. Truth-checked: the
                 # surfaced works (GVB Oranje Loper / Surinameplein / 4-Jul zomerdienstregeling) are REAL
                 # + useful, and a web check correctly overrode a stale closure sign. So web_search IS a
                 # valid disruption source — rule flipped to cite-it + frame-as-a-report + never-invent-a-
                 # specific-the-source-didn't-give + treat-a-photo-as-possibly-stale. Behavior, no migration.
                 # 1.6.0: W1 — the NL live board. The `departures` board now folds in the free OVapi
                 # GTFS-RT feed for NL stops (delay-minutes "+2 late", train spoor "spoor 9 (was 5)",
                 # ⚠️ service alerts) — broker-side + fail-open, so the rules flip from "Google has no
                 # delay/platform, never state them" to "quote them WHEN the board returns them this
                 # turn (NL live feed), never invent." Plus a proactive board card + a tight
                 # departure-imminent monitor that pushes a track-change on a booked leg → migration
                 # 0002 (structured board diff: platform/track/delay columns). MINOR (new migration id).
                 # 1.6.1: W1 review hardening (no migration). The track-change diff is now fully
                 # DETERMINISTIC in the script: --update takes --track (actual) + --scheduled (the
                 # "(was Y)") and pushes only when actual≠scheduled AND not already pushed — so a
                 # pre-window change still fires once (no miss), a first sighting / on-schedule seeds
                 # the baseline silently (no "spoor X, not None"), and a blank --track never wipes the
                 # dedupe baseline. No imminent cron for an already-departed leg (no ~1yr stale job).
                 # PATCH (bug fixes, no new migration id).
                 # 1.6.2: marketing copy only — a `long_md` landing body for oteny.com/bots/travel
                 # (now bundle-sourced + re-seeded, like the teaser) that explains the live NL board,
                 # flight watch, group costs + the link-out boundary. No runtime/behavior change.
                 # 1.7.0: declares `task_escalations` (the live-inventory task → builder, on the
                 # trip-planner skill only) — the surgical per-task escalation for listing/booking
                 # work; chat/onboarding/dashboard stay on the cheap assistant model. Declaration
                 # only (the cooperative steer + switch tool are platform-side); no migration.
                 # 1.7.1: bookings.md steer — call switch_persona(task=live-inventory) before a
                 # deals/listing hunt, done=true after (the runtime shipped platform-side; the steer
                 # rides the reference the BOOKING intent loads — the body is at the 20k ceiling). No migration.

# The skills delivered together. Four child skills: engine + travel-onboarding + voice + visual.
skills:
  - travel-onboarding
  - trip-planner
  - travel-concierge-voice
  - trip-dashboard
voice_skill: travel-concierge-voice         # the persona; loaded on demand, NOT in SOUL

base_language: en
model_tier: assistant                    # GLOBAL (Gemini-Flash v1) — the reason every task is a checklist
# Per-task model escalation: the bot runs cheap for chat, but a listing hunt (real,
# bookable rentals/tickets with a live URL + price) is fabrication-prone on Flash, so
# it steers to the stronger builder model FOR THAT TASK ONLY, then drops back. This is
# NOT a bundle-wide floor — chat, onboarding, the trip dashboard all stay on assistant.
task_escalations:
  - task: live-inventory
    model_tier: builder
    skills: [trip-planner]               # the skill that carries listing/booking work
    triggers: >
      finding or verifying real bookable listings, rentals, tickets, or offers —
      anything with a live URL and price the user may act on
    model_tier_reason: fabrication-prone
toolset_contribution: [terminal, execute_code, cron, send_message]   # unioned into the agent
runtime:
  # TRANSITIONAL dual-run hint: Talents WITH pyproject.toml+uv.lock sync into
  # ~/.hermes/runtimes/<slug>/; invoke via talent-run. This list is only consulted for
  # Talents without a lock (shared pip union). Real pin: pyproject.toml + uv.lock.
  # trip-dashboard/scripts/trip_card.py needs matplotlib — run via talent-run.
  python_packages: [matplotlib]
delivery: baked                          # delivered with the bot
price: free                              # free travel on-ramp (the OV demo Talent)

# First-party tools the bot relies on; Oteny provisions these always-on in the
# `web` toolset (see TOOLS.md at the repo root). Calendar is intentionally ABSENT
# in v1 — the bot degrades gracefully (no cron gated on it); see
# references/safety-boundaries.md.
tools:
  required: [travel, web_search, flight_status]   # travel = Google routes/transit/departures;
                                          # flight_status = structured flight status/gate (AeroDataBox)
  stubbed: []                            # calendar absent -> degrade, not stubbed as a file

# Routing declaration — APPLIED by the index-reconciler, never hand-edited into SOUL.
# DM-FIRST: the native skill index routes DMs (auto-satisfies — no required group
# binding). The channel_prompt below is used only WHEN the human binds the bot to a
# Telegram trip group (a bot cannot create a group or add humans itself). The group is
# resolved at runtime from channel_directory.json (never a hardcoded id).
routing:
  channel: "OtenyTravelTalent"               # group NAME, resolved via channel_directory.json
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **Travel-talent** — a private travel
    concierge — in this group. Refer to yourself by your own bot name; the Talent is a
    capability you're using, not your identity.
    On the FIRST message from a new tenant (no ~/.hermes/data/oteny-travel-talent/profile.yaml
    yet), or when asked "what can you do?" / "how does this work?" / to start a trip, load
    the travel-onboarding skill (skill_view name='travel-onboarding') and run its welcome + intake.
    For ANY message about a trip, a destination, getting somewhere (flights, trains, buses,
    driving, transfers, routes, delays), a hotel/stay, a booking, the day's plan/schedule,
    packing or documents, or a shared expense: load the trip-planner skill first
    (skill_view name='trip-planner') and follow its "Every message — triage first"
    checklist step by step (it dispatches to references/checklists.md per intent) and its
    hard rules — no vibe-served facts (read the DB or call the `travel` tool in the same
    turn), verify flight/train status live before any leave-by, link out (never book or
    pay), advisory-only on visa/entry/health. Steer every "getting somewhere" question to
    the `travel` tool, not web_search.
    THIS IS A GROUP: map each speaker's telegram_user to a members row, greet a NEW member
    by name when they first appear (see skills/telegram-groups), let anyone ask, claim
    their own todos, and log expenses; requires privacy-mode-off. Load travel-concierge-voice
    for the warm, concise, group-aware concierge voice. Reply in the tenant's language; keep
    replies compact and Telegram-friendly.
  signature: "oteny-travel-talent"

# Shared tenant identity (name/language/timezone) + this bot's extension (home_city,
# default_currency, traveller prefs) live in ~/.hermes/data/oteny-travel-talent/profile.yaml,
# produced by first-run. Two seeds: shared identity (small, Hermes auto-loads) +
# per-bot domain memory. Per-tenant customizations land in the data-plane override
# (memory.md / overrides.md), NEVER in these shipped files.
seed_memory: profile/USER.md.template          # -> ~/.hermes/memories/USER.md (identity)
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/oteny-travel-talent/memory.md
