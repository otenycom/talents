# Scenario: the W1 NL live board — "any delays?" on an NL route now answers from the
# structured OVapi feed folded into the `departures` board, NOT a web_search of works.
#
# Proves the v1.6.0 capability: for an NL stop the `departures` board carries the live
# delay-minutes / train spoor / ⚠️ service alert (broker-side OVapi GTFS-RT), and the model
# quotes them instead of (a) saying "Google has no delay data" or (b) grinding web_search.
# The transit path writes no DB row → LIVE-ONLY (reply/trace); the mock backend SKIPs it,
# the dev-loop `test --backend live` (a neutralized clone) proves it. The standing
# anti-fabrication discipline still holds: no web_search of the route, no image_generate.
bot: oteny-travel-talent
live_only: true

seed:
  profile:
    home_city: Amsterdam
    home_timezone: Europe/Amsterdam
    language: en
    default_currency: EUR
  user_md: |
    # Identity
    Name: Test Tenant
    Language: en

turns:
  - user: "I'm at Surinameplein, Amsterdam going to Weesperplein — when's the next one, and are there any delays right now?"
    expect:
      reply:
        # at least one real clock time from the board (the live departures, never invented)
        regex: "[0-9]{1,2}:[0-9]{2}"
      trace:
        markers: ["travel"]                 # the structured board carries the delay/alert
        # the delay answer comes from the OVapi-enriched board, NOT a web_search of "storingen",
        # and the map is never an AI fabrication
        absent: ["web_search", "image_generate"]
