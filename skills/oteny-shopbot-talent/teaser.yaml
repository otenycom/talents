# ShopBot sample-chat teaser — rendered on the /bots/shopbot landing by the shared
# oteny_website.talent_teaser macro (seeded into hh.talent.teaser_json). Modelled on a real
# household's prod session (hh00009): two people sharing one live list across TWO stores (a
# default supermarket + a specialty store), aisle ordering with the default store on top,
# frictionless add, routing an item to a second store, and the bare-number check-off people
# actually text while walking the shop. Text only (no media) — crisp at any DPI, accessible.
teaser:
  title: "Groceries"
  icon: fa-shopping-basket
  members:
    - {key: me,  name: You,      role: me}
    - {key: sam, name: Sam}
    - {key: bot, name: OtenyBot, role: bot}
  turns:
    - {from: me,  at: "18:02", text: "skyr, blueberries, spinach, eggs x12"}
    - {from: bot, at: "18:02", text: "Added — filed by aisle at Albert Heijn (your default store). 9 items on the list now."}
    - {from: sam, at: "18:41", text: "ribeye for saturday — get it at the butcher"}
    - {from: bot, at: "18:41", text: "Routed ribeye ×1 to the butcher 🔪 Everything else stays at Albert Heijn — I keep each store on its own list."}
    - {from: me,  at: "18:55", text: "what's left? heading out"}
    - {from: bot, at: "18:55",
       card: {lines: ["🛒 Albert Heijn",
                      "🥬 Produce — spinach, blueberries, bananas ×3",
                      "🥖 Bakery — sourdough",
                      "🥛 Dairy — Skyr, Greek yoghurt, eggs ×12",
                      "🥩 Meat & fish — smoked chicken",
                      "🛒 The butcher",
                      "🥩 Meat — ribeye ×2"],
              status: "9 items · default store first, walk top to bottom"}}
    - {from: bot, at: "18:55", text: "Sorted so you walk each shop section by section — no backtracking, no double trip."}
    - {from: sam, at: "19:24", text: "3"}
    - {from: bot, at: "19:24", text: "Checked off Greek yoghurt 👍 8 left. Sam's shopping live — you two won't grab the same things twice."}
