# ShopBot — the sellable Talent spec (a Talent = persona + skills, one of several
# loadable on a tenant's OtenyBot). Composition is config: drop the skill files + merge
# the routing declaration. Model tier is GLOBAL (set on the agent), not per-talent. The
# internal slug (bot:) and the runtime group name (routing.channel) stay as-is —
# internal identifiers, never user-facing.
bot: oteny-shopbot-talent
display_name: ShopBot
tagline: "One shared grocery list the whole house keeps live — sorted by aisle so you never crisscross the store."
# The landing-page "what it does" body (oteny.com/bots/shopbot) — plain paragraphs, escaped,
# split on blank lines (hh.talent.long_md → store.py _paragraphs). House voice: lead with the
# value, plain English, honest. Re-seeded from this file on every catalog seed.
long_md: |
  Share ShopBot with the people you live with and you all keep one grocery list, live. Add
  to it from anywhere — the couch, the office, the school run — and whoever's at the shop
  sees the same list update the moment you do.

  Drop in whatever you need, however you type it ("skyr, blueberries, spinach, eggs x12"),
  and it files each item under the right aisle. When you head out it hands you the list
  sorted section by section, so you walk the store top to bottom — no crisscrossing, no
  forgotten corner.

  Shopping across more than one store? Just say where each thing goes — "ribeye at the
  butcher" — and it keeps a separate list per shop, your default store first. Check items
  off as you grab them (text the number, that's it), and because everyone shares the list,
  two of you out at the same time won't buy the same thing twice.

  It quietly tracks who added what and drops bought items off the active list, so the list
  is always right without anyone having to ask "did you get the milk?"
version: 1.0.2   # Talent semver — a label over the delivered commit; bump on every change,
                 # MINOR/MAJOR when migrations.yaml gains an id (lint-enforced).
                 # 1.0.1: marketing copy only — a `long_md` landing body for the website
                 # (the shared live list, aisle ordering, per-store routing, and check-off).
                 # No runtime/behavior change.

# A single umbrella skill (the shopping-list engine: persona + operating rules + the
# per-intent checklists). No child skills needed.
skills:
  - oteny-shopbot-talent
voice_skill: oteny-shopbot-talent          # the persona lives in the umbrella skill, NOT in SOUL

base_language: en
model_tier: assistant                       # GLOBAL (Gemini-Flash v1); a weekly nudge cron stays on it
toolset_contribution: [terminal, execute_code, cron, send_message]   # unioned into the agent
delivery: baked                             # delivered with the bot
price: free                                 # free on-ramp

# Tools the bot relies on. It runs on built-ins only (sqlite via terminal, cron,
# send_message); nothing to install. A snapped-receipt importer is an OPTIONAL
# enhancement that degrades gracefully when the read-document tool is absent.
tools:
  required: []
  stubbed: []

# Routing declaration — APPLIED by the index-reconciler, never hand-edited into SOUL.
# The group is resolved at runtime from channel_directory.json (never a hardcoded id).
# Convention: the tenant's ShopBot group is named after the bot; onboarding may set
# routing.channel_chat_id explicitly once the group is bound. Privacy-mode-off so the
# bot sees every household member's edits to the shared list.
routing:
  channel: "OtenyShopBotTalent"             # group NAME, resolved via channel_directory.json
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **ShopBot** in this group — a shared
    household grocery list. Refer to yourself by your own bot name; the Talent is a
    capability you're using, not your identity.
    On the FIRST message from a new tenant (no ~/.hermes/data/oteny-shopbot-talent/profile.yaml yet),
    or when asked "what can you do?" / "how does this work?", load the oteny-shopbot-talent
    skill (skill_view name='oteny-shopbot-talent') and run its first-run intake.
    For any message about groceries, the shopping list, adding/removing an item, a
    quantity, marking something bought, "what's left", or which store to buy at: load the
    oteny-shopbot-talent skill first and follow its master triage and per-intent
    checklists step by step, and its hard rules — read the list from the database in the
    same turn (never recite it from memory), file each item under its store + aisle
    section, and drop bought items off the active list. In a household group, answer
    untagged messages; attribute each add/check-off to the member who sent it. Reply in
    the tenant's language; keep replies short and Telegram-friendly.
  signature: "oteny-shopbot-talent"

# Shared tenant profile (name/language/timezone) + this bot's extension (default store /
# household / reminders) live in ~/.hermes/data/oteny-shopbot-talent/profile.yaml, produced
# by first-run. Two seeds (the per-bot memory split): shared identity (small, Hermes
# auto-loads) + per-bot domain memory.
seed_memory: null                              # shared identity USER.md seeded by the primary bot
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/oteny-shopbot-talent/memory.md
