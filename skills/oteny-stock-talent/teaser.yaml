# StockBot sample-chat teaser — rendered on the /bots/stock landing by the shared
# oteny_website.talent_teaser macro (seeded into hh.talent.teaser_json). Modelled on a real
# investors' group session (hh00066): terse, numbers-first research GROUNDED IN LIVE PRICES
# (a per-ticker take with a clear Buy/Hold + analyst targets), the All-In podcast distillation
# (core thesis → key takeaways → company positioning → portfolio watch), and a daily cron
# brief — all in a shared group of friends. Research/education, not financial advice. Text
# only (no media) — crisp at any DPI, accessible.
teaser:
  title: "Stock Investments"
  icon: fa-line-chart
  members:
    - {key: me,    name: You,      role: me}
    - {key: arjen, name: Arjen}
    - {key: bot,   name: OtenyBot, role: bot}
  turns:
    - {from: me,   at: "9:12", text: "news/trend on TSLA, GOOG?"}
    - {from: bot,  at: "9:12",
       card: {title: "Live tape · 23 Jun",
              lines: ["TSLA  $405.20  ▲ clawing back above $400",
                      "GOOG  $349.56  ▼ −5% on the AI talent war"],
              status: "prices pulled live · not financial advice"}}
    - {from: bot,  at: "9:12", text: "TSLA — Hold. July 2 delivery report (~400k expected) is the catalyst. GOOG — pullback looks technical; long-term AI backing is the strongest in big tech."}
    - {from: arjen, at: "9:20", text: "what did All-In say this week?"}
    - {from: bot,  at: "9:20",
       card: {title: "All-In · E271 — distilled",
              lines: ["Power, not chips, is the AI choke point",
                      "$725B hyperscaler capex — >2% of US GDP",
                      "LLY Retatride: −37 lb / 40 wks, mid-'27 FDA"],
              status: "core thesis + 4 tickers positioned"}}
    - {from: me,   at: "9:31", text: "send a 6-bullet US brief every day at 5pm"}
    - {from: bot,  at: "9:31", text: "Scheduled ✅ Daily US market brief at 17:00 Amsterdam — terse, numbers-first, posted right here. First one's on its way."}
