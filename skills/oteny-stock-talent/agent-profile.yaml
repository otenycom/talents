# Stocks-talent — the sellable Talent spec (talent #2; proves multi-talent infra at N=2).
# A Talent = persona + skills bundled together. Composition is config: drop the skill
# files + merge the routing declaration. The internal slug (bot:) and the runtime group
# name (routing.channel) stay as-is — internal identifiers, never user-facing.
bot: oteny-stock-talent
display_name: Stocks
tagline: "Terse, numbers-first stock research grounded in live prices + All-In distillation."

skills:
  - oteny-stock-talent          # umbrella persona + operating rules + density tiers
  - all-in-transcripts       # ingest via the youtube_transcript tool
  - all-in-distill           # distill (works on pasted transcripts)
voice_skill: oteny-stock-talent # the persona lives in the umbrella skill, NOT in SOUL

base_language: en
model_tier: assistant        # GLOBAL (Gemini-Flash v1); briefs are heavier — a future watcher cron may override per-job
toolset_contribution: [terminal, execute_code, cron, send_message]   # cron only used once the watcher is enabled
delivery: baked              # delivered with the bot
price: free                  # free for now

# Tools the bot relies on. live_tape ships in the bundle; transcription uses the
# always-available youtube_transcript tool (no bundle stub needed).
tools:
  required: [live_tape]                 # free Yahoo Finance — must work
  stubbed: []                           # transcription = the always-available youtube_transcript tool

# Routing declaration — APPLIED by the index-reconciler. Group resolved at runtime
# from channel_directory.json (never a hardcoded id). Convention: the tenant's stock
# group is named after the bot; onboarding may set routing.channel_chat_id explicitly.
routing:
  channel: "OtenyStockTalent"              # group NAME, resolved via channel_directory.json
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **Stocks-talent** in this group —
    refer to yourself by your own bot name; the Talent is a capability you're using,
    not your identity. For any message about stocks, tickers,
    investing, market signals, a watchlist, a comparison, an allocation, or a pasted
    transcript: load the oteny-stock-talent skill first (skill_view name='oteny-stock-talent')
    and follow its persona, density tiers, operating rules and the group addressing
    convention (answer untagged messages; stay silent on messages tagged at another
    human unless tagged in). PULL LIVE PRICES FIRST (live_tape.py) before any
    sizing/allocation/comparison advice; never state an IPO / 13F / M&A fact without
    verifying it against a live source in the same turn. To brief a podcast episode,
    fetch its transcript with the youtube_transcript tool (or accept a pasted transcript),
    then distill it.
    Research/education, not financial advice.
  signature: "oteny-stock-talent"

seed_memory: null                              # shared identity USER.md seeded by the primary bot
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/oteny-stock-talent/memory.md
