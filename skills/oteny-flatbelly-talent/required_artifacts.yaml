# OtenyFlatBellyTalent first-run manifest — the setup GOAL, declared (not implied).
# selfcheck.py walks this; the SKILL.md first-run section drives toward READY.
# All paths are namespaced under the bot so bots never collide.
bot: oteny-flatbelly-talent
base_language: en

artifacts:
  - kind: sqlite_db
    path: ~/.hermes/data/oteny-flatbelly-talent/food.db
    must_have_tables: [meals, weight, daily_metrics, workouts, waist]

  - kind: profile
    path: ~/.hermes/data/oteny-flatbelly-talent/profile.yaml
    required_fields: [goal_weight_kg, start_weight_kg, height_cm, age, sex, language, timezone]

  - kind: memory                 # shared cross-skill identity — small; Hermes auto-loads it
    path: ~/.hermes/memories/USER.md
    label: shared identity
    remediation: "first-run §profile: render the identity USER.md from profile/USER.md.template"

  - kind: memory                 # per-bot DOMAIN memory — food-tracker triage reads it
    path: ~/.hermes/data/oteny-flatbelly-talent/memory.md
    label: domain memory
    blocking: false              # accrues over time / lazily; never a hard gate to coach
    remediation: "first-run §profile: render memory.md from profile/memory.md.template"

  - kind: localized_bundle
    profile_path: ~/.hermes/data/oteny-flatbelly-talent/profile.yaml
    matches_profile_field: language
    language_marker: ~/.hermes/data/oteny-flatbelly-talent/.bundle_lang

  - kind: routing                      # DM-first: the native skill index routes DMs
    config_path: ~/.hermes/config.yaml #   → auto-satisfies (no SOUL signature needed). A
    platform: telegram                 #   group-bound Talent would add requires_channel_prompt:
    signature: "oteny-flatbelly-talent"   #   true to assert its channel_prompt is registered.

  - kind: cron
    jobs_path: ~/.hermes/cron/jobs.json
    jobs:
      - "OtenyFlatBellyTalent daily morning log"
      - "OtenyFlatBellyTalent daily evening log"
      - "OtenyFlatBellyTalent weekly dashboard"

  - kind: tools
    present_if_file:
      dashboard: ~/.hermes/skills/talents/oteny-flatbelly-talent/weight-progress-dashboard/scripts/generate.py
    stubbed: []
