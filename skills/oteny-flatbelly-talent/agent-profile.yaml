# Flatbelly-talent — the sellable Talent spec (a Talent = persona + skills, one of
# several loadable on a tenant's OtenyBot). Composition is config, not SOUL surgery:
# drop the skill files + merge the routing declaration. Model tier is GLOBAL (set on
# the agent), not per-talent. The internal slug (bot:) and the runtime group name
# (routing.channel) stay as-is — internal identifiers, never user-facing.
bot: oteny-flatbelly-talent
display_name: FlatbellyBot
tagline: "Your private flat-belly coach — real food, protein timing, sleep, evidence-based."
# The landing-page "what it does" body (oteny.com/bots/flatbelly) — plain paragraphs, escaped,
# split on blank lines (hh.talent.long_md → store.py _paragraphs). House voice: lead with the
# value, plain English, honest. Re-seeded from this file on every catalog seed.
long_md: |
  Tell FlatbellyBot what you ate and it does the rest — a private coach in your own chat
  that turns one quick line ("88 kg, slept 81, salmon and three eggs") into a full picture
  of your day. No app to open, no forms to fill — just text it like you'd text a friend.

  It breaks every meal into calories, protein and the rest of the macros, and tracks
  leucine — the amino acid that flips on the muscle-keeping switch — so you hold onto muscle
  while you lose the fat. After each meal it tells you exactly how much protein you have left
  to hit your target, and what to eat to get there.

  Weigh in each morning and it reads the trend, not the daily noise: a true slope in kilos
  per week, and whether you're in the healthy range. It tracks your sleep, steps, workouts
  and waist too — and every Sunday it drops a weight-and-waist chart so you can watch the
  line go the right way.

  The coaching is warm and never preachy, grounded in evidence rather than fads. It's
  coaching, not medical advice — and if something you log looks like a red flag, it'll tell
  you to check with a doctor.
version: 1.0.1   # Talent semver — a label over the delivered commit; bump on every change,
                 # MINOR/MAJOR when migrations.yaml gains an id (lint-enforced).
                 # 1.0.1: marketing copy only — a `long_md` landing body for the website
                 # (the macro/leucine breakdown, the morning weight trend, the Sunday chart,
                 # and the coaching-not-medical boundary). No runtime/behavior change.

# The skills delivered together (Option A: separately installable).
skills:
  - onboarding
  - food-tracker
  - fat-loss-protocol
  - flatbelly-coach-voice
  - weight-progress-dashboard
voice_skill: flatbelly-coach-voice          # the persona; loaded on demand, NOT in SOUL

base_language: en
model_tier: assistant                    # GLOBAL (Gemini-Flash v1); a heavy cron may override per-job
toolset_contribution: [terminal, execute_code, cron, send_message]   # unioned into the agent
delivery: baked                          # delivered with the bot
price: free                              # free on-ramp for the paid-retention pilot

# Routing declaration — APPLIED by the index-reconciler, never hand-edited into SOUL.
# The group is resolved at runtime from channel_directory.json (never a hardcoded id).
# Convention: the tenant's flatbelly-bot group is named after the bot; onboarding may set
# routing.channel_chat_id explicitly once the group is bound.
routing:
  channel: "OtenyFlatBellyTalent"               # group NAME, resolved via channel_directory.json
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **Flatbelly-talent** — a private
    flat-belly (visceral-fat) coach — in this group. Refer to yourself by your own bot
    name; the Talent is a capability you're using, not your identity.
    On the FIRST message from a new tenant (no ~/.hermes/data/oteny-flatbelly-talent/profile.yaml yet), or
    when asked "what can you do?" / "how does this work?" / to (re)set goals, load the
    onboarding skill (skill_view name='onboarding') and run its welcome + intake.
    For any message about food, meals, calories, macros, weight, weigh-ins, sleep,
    workouts, steps, waist or a health goal: load the food-tracker skill first
    (skill_view name='food-tracker') and follow its "Every message — triage first"
    checklist step by step (it dispatches to references/checklists.md per intent) and
    its hard rules — no vibe-served facts (read the DB in the same turn), morning-only
    weight trends, leucine threshold per meal, exact spelled-out macro labels. Load flatbelly-coach-voice
    for the warm, non-judgmental, evidence-based coaching voice, and fat-loss-protocol
    for the method/evidence. Reply in the tenant's language; keep replies compact and
    Telegram-friendly. Honor the medical safety boundary (not medical advice; red-flag
    escalation; no invented diagnoses).
  signature: "oteny-flatbelly-talent"

# Shared tenant profile (name/language/timezone) + this bot's extension
# (goal/height/targets) live in ~/.hermes/data/oteny-flatbelly-talent/profile.yaml, produced by first-run.
# Two seeds (the per-bot memory split): shared identity (small, Hermes auto-loads) + per-bot domain memory.
seed_memory: profile/USER.md.template          # -> ~/.hermes/memories/USER.md (identity)
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/oteny-flatbelly-talent/memory.md
