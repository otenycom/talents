# Flatbelly-talent — the sellable Talent spec (a Talent = persona + skills, one of
# several loadable on a tenant's OtenyBot). Composition is config, not SOUL surgery:
# drop the skill files + merge the routing declaration. Model tier is GLOBAL (set on
# the agent), not per-talent. The internal slug (bot:) and the runtime group name
# (routing.channel) stay as-is — internal identifiers, never user-facing.
bot: oteny-flatbelly-talent
display_name: FlatbellyBot
tagline: "Your private flat-belly coach — real food, protein timing, sleep, evidence-based."
# The landing-page "what it does" body (oteny.com/bots/flatbelly) — plain paragraphs, escaped,
# split on blank lines (hh.talent.long_md → store.py _paragraphs). House voice: lead with the
# value, plain English, honest. Re-seeded from this file on every catalog seed.
long_md: |
  Tell FlatbellyBot what you ate and it does the rest — a private coach in your own chat
  that turns one quick line ("88 kg, slept 81, salmon and three eggs") into a full picture
  of your day. No app to open, no forms to fill — just text it like you'd text a friend.

  It breaks every meal into calories, protein and the rest of the macros, and tracks
  leucine — the amino acid that flips on the muscle-keeping switch — so you hold onto muscle
  while you lose the fat. After each meal it tells you exactly how much protein you have left
  to hit your target, and what to eat to get there.

  Weigh in each morning and it reads the trend, not the daily noise: a true slope in kilos
  per week, and whether you're in the healthy range. It tracks your sleep, steps, workouts
  and waist too — and every Sunday it drops a weight-and-waist chart so you can watch the
  line go the right way.

  The coaching is warm and never preachy, grounded in evidence rather than fads. It's
  coaching, not medical advice — and if something you log looks like a red flag, it'll tell
  you to check with a doctor.
version: 1.2.1   # Talent semver — a label over the delivered commit; bump on every change,
                 # MINOR/MAJOR when migrations.yaml gains an id (lint-enforced).
                 # 1.2.0: the daily reminders are the RICH "day so far" status summaries
                 # again (original behavior restored — the v1.1.x zero-tool nudge was a
                 # workaround for since-fixed environment bugs: the platform-level cron
                 # toolset cap (reverted host-side) and a file-search blindness (fixed
                 # upstream)).
                 # Reminders load food-tracker, run preflight + a fresh DB read, open with
                 # the grounded summary, ask only what's missing. Steering kept: `lite`
                 # model, lean per-job toolsets [terminal, file, skills], max_turns 15
                 # declared from the measured healthy profile (4–9 calls/fire).
                 # 1.1.2: every cron pins its TOOL surface (`enabled_toolsets` in the crons:
                 # policy; provision_cron emits it). Reminders = `[no_mcp]` → zero tools
                 # (live-verified: request carries no tools array — a tool-loop is now truly
                 # structurally impossible); weekly = [terminal, file] matching its skill's
                 # demands. Closes the impossible-task gap behind the 2026-07-02 90-iteration
                 # runaway (job fell back to the terminal-less platform_toolsets.cron cap
                 # while the skill demanded script execution).
                 # 1.1.1: ship the missing `scripts/migrate.py` — its absence silently made
                 # preflight report `MIGRATIONS: none`, so `0003_cron_localtime` never surfaced
                 # and the live reminder crons stayed the old heavy protocol (looped to the
                 # 90-iteration brake on Gemini-Flash). Adds a "never hunt for a file" hard rule
                 # to food-tracker (the observed glob-vs-regex `search_files` runaway) and
                 # reconciles the reminder-role copy with the thin-nudge design.
                 # 1.1.0: cron cost reshape (talent-model-steering W3/W4/W6). The daily
                 # reminders are now single cheap `lite` nudges (no skill load); the full
                 # wrap-up runs when the owner REPLIES (chat path, via channel_prompt). Adds
                 # the per-job `crons:` cost policy (model/max_turns/expected_cost) + a
                 # `0003_cron_localtime` migration that fixes the off-by-offset schedule and
                 # re-registers live crons. (1.0.1: marketing copy only.)

# The skills delivered together (Option A: separately installable).
skills:
  - flatbelly-onboarding
  - food-tracker
  - fat-loss-protocol
  - flatbelly-coach-voice
  - weight-progress-dashboard
voice_skill: flatbelly-coach-voice          # the persona; loaded on demand, NOT in SOUL

base_language: en
model_tier: assistant                    # GLOBAL chat persona (Gemini-Flash); crons pin their own per-job model below
toolset_contribution: [terminal, execute_code, cron, send_message]   # unioned into the agent
runtime:
  # Python libs this bundle's [terminal] scripts import at runtime, installed by the platform
  # into the tenant's SYSTEM python3 (the hermeshost deployer + golden/parent images). Names
  # only — the version is pinned by hermeshost (infra/tenant-runtime/constraints.txt).
  # weight-progress-dashboard/scripts/generate.py (the weekly cron) needs matplotlib.
  python_packages: [matplotlib]
delivery: baked                          # delivered with the bot
price: free                              # free on-ramp for the paid-retention pilot
# Verify budget (talent-model-steering W4): the whole scenario-suite staging run must
# stay under this measured spend or the dev-loop verify holds the Talent for review
# (a runaway can't go green). OTC = internal credits; tune from measured runs.
expected_cost_otc: 2.0

# Routing declaration — APPLIED by the index-reconciler, never hand-edited into SOUL.
# The group is resolved at runtime from channel_directory.json (never a hardcoded id).
# Convention: the tenant's flatbelly-bot group is named after the bot; onboarding may set
# routing.channel_chat_id explicitly once the group is bound.
routing:
  channel: "OtenyFlatBellyTalent"               # group NAME, resolved via channel_directory.json
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **Flatbelly-talent** — a private
    flat-belly (visceral-fat) coach — in this group. Refer to yourself by your own bot
    name; the Talent is a capability you're using, not your identity.
    On the FIRST message from a new tenant (no ~/.hermes/data/oteny-flatbelly-talent/profile.yaml yet), or
    when asked "what can you do?" / "how does this work?" / to (re)set goals, load the
    flatbelly-onboarding skill (skill_view name='flatbelly-onboarding') and run its welcome + intake.
    For any message about food, meals, calories, macros, weight, weigh-ins, sleep,
    workouts, steps, waist or a health goal: load the food-tracker skill first
    (skill_view name='food-tracker') and follow its "Every message — triage first"
    checklist step by step (it dispatches to references/checklists.md per intent) and
    its hard rules — no vibe-served facts (read the DB in the same turn), morning-only
    weight trends, leucine threshold per meal, exact spelled-out macro labels. Load flatbelly-coach-voice
    for the warm, non-judgmental, evidence-based coaching voice, and fat-loss-protocol
    for the method/evidence. Reply in the tenant's language; keep replies compact and
    Telegram-friendly. Honor the medical safety boundary (not medical advice; red-flag
    escalation; no invented diagnoses).
  signature: "oteny-flatbelly-talent"

# Per-job cron cost policy (talent-model-steering W4/W6 — "the Talent spec is THE knob").
# The single source of truth the lint enforces AND provision_cron emits from; every name
# must match a required cron in required_artifacts.yaml. Each job pins its own `model`
# (a reminder is cheap `lite`, not the owner's chat persona) and a `max_turns` cap (an
# unbounded cron turn can loop and drain credits — the runaway that ate 28% of a pilot
# owner's spend). `expected_cost.per_fire_otc` is the author's budget for one fire (used
# by the author cost-per-Talent report). `max_turns` is DECLARED + linted now; it is only
# EMITTED to the cronjob tool once a deployed Hermes honors a per-cron cap (W6) — until
# then the lint + the dev-loop cost grade enforce it at authoring time. A daily-or-more
# job pinned above `lite` must carry a written `model_justification:` (lint-enforced).
#
# `enabled_toolsets` pins each job's TOOL surface, and every job MUST declare it — an
# omitted list falls back to the tenant's `platform_toolsets.cron` cap, which is how the
# 2026-07-02 hh00067 runaway happened: that cap has NO terminal, the reminder prompt's
# skill demanded script execution (an impossible task), and the model burned 90
# iterations hunting with search_files. The reminders are pure text nudges, so they get
# ZERO tools via the `no_mcp` sentinel: a literal empty list is FALSY upstream
# (cron/scheduler.py falls back to the platform cap), while `[no_mcp]` passes the
# truthiness gate and the MCP-merge strips it, leaving a true empty allowlist — verified
# live 2026-07-02 (captured request carries no tools array; a tool-loop is structurally
# impossible). The weekly dashboard genuinely runs a script + sqlite, so it declares
# terminal+file — matching what the skill instructs, never less.
crons:
  # v1.2.0: the daily reminders are the ORIGINAL rich "day so far" status
  # summaries again (preflight + fresh DB read + grounded summary + ask only
  # what's missing). The v1.1.x zero-tool nudge was a temporary workaround for
  # since-fixed environment bugs (the platform-level cron toolset cap, reverted
  # host-side; a file-search hidden-dir blindness, fixed upstream) — not a
  # product choice.
  # Cost steering stays: `lite` model, a lean per-job toolset matching exactly
  # what the skill instructs (terminal for preflight/sqlite, file, skills for
  # skill_view references), and max_turns from the measured healthy profile
  # (rich fires measured 4–9 calls; 15 = alarm headroom, declared + linted,
  # emitted only once a deployed Hermes honors a per-cron cap — W6).
  - name: "OtenyFlatBellyTalent daily morning log"
    frequency: daily
    model: lite
    max_turns: 15
    enabled_toolsets: [terminal, file, skills]
    expected_cost: { per_fire_otc: 0.10 }
  - name: "OtenyFlatBellyTalent daily evening log"
    frequency: daily
    model: lite
    max_turns: 15
    enabled_toolsets: [terminal, file, skills]
    expected_cost: { per_fire_otc: 0.10 }
  - name: "OtenyFlatBellyTalent weekly dashboard"
    frequency: weekly
    model: lite
    max_turns: 15
    enabled_toolsets: [terminal, file]   # runs generate.py + reads the DB — must match the skill's demands
    expected_cost: { per_fire_otc: 0.30 }

# Shared tenant profile (name/language/timezone) + this bot's extension
# (goal/height/targets) live in ~/.hermes/data/oteny-flatbelly-talent/profile.yaml, produced by first-run.
# Two seeds (the per-bot memory split): shared identity (small, Hermes auto-loads) + per-bot domain memory.
seed_memory: profile/USER.md.template          # -> ~/.hermes/memories/USER.md (identity)
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/oteny-flatbelly-talent/memory.md
