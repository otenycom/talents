# odoo-website — the sellable "WebsiteBot" Talent. A Talent = persona + skills, one
# of several loadable on a tenant's OtenyBot. This one installs a real website engine (Odoo
# Community) INSIDE the tenant's box, lets the owner build a site by chatting, and puts it
# online at <slug>.oteny.bot via the built-in host_website tool — no server to rent, no ports
# to open. Composition is config, not SOUL surgery: drop the skill files + merge routing.
bot: odoo-website
display_name: WebsiteBot
tagline: "Build a real website by chatting — a landing page, a shop, a booking site — and put it online at your own address."
# The landing-page "what it does" body (oteny.com/bots/odoo-website) — plain paragraphs,
# escaped, split on blank lines. House voice: lead with the value, plain English, honest.
long_md: |
  Tell WebsiteBot what you want online — "a one-page site for my cafe with a menu and opening
  hours", "a small shop for my pottery", "a booking page for my studio" — and it builds it for
  you, then puts it on the internet at your own web address. No hosting to buy, no domain to
  configure, no code to write. You describe; it builds and publishes.

  Under the hood it installs Odoo Community — the same open-source engine thousands of real
  businesses run — right inside your private box, and drives its drag-and-drop website builder
  for you. That means a genuine site with real pages, a blog, a shop with a cart, or a booking
  form — not a throwaway template. Everything lives in your box; nothing is shared with anyone.

  When it's ready, WebsiteBot exposes it at https://<your-name>.oteny.bot over secure HTTPS,
  with a valid certificate and nothing exposed to the open internet — the connection is dialed
  outward from your box, so there's no server for an attacker to reach. Ask it to change the
  copy, add a page, or take the site down, and it just does it.

  It's your own web team in a chat: it keeps the site running, restarts it if it hiccups, and
  tells you the public link every time. Runs on the Max plan — your own dedicated server, with
  room for a real website engine alongside your agent.
version: 1.0.1   # Talent semver — a label over the delivered commit; bump on every change,
                 # MINOR/MAJOR when migrations.yaml gains an id (lint-enforced).
                 # 1.0.0: first release — install Odoo CE user-space (venv + pinned nightly +
                 # pip-embedded pgserver, no root), build the site via Odoo's website builder,
                 # host it at <slug>.oteny.bot via host_website, keep it alive.

# The skills delivered together.
skills:
  - odoo-website
voice_skill: odoo-website

base_language: en
model_tier: builder                      # installs software + reasons about hosting/debugging → the builder tier
# Hardware requirement (a capability, NOT a raw customer tier — substrate is internal).
# `substrate: vm` = a full kernel + dedicated machine (not a packed gVisor container): real
# systemd supervises the app, Odoo's one-time init is minutes (no gofer tax), and the box has
# its own egress IP. `min_tier` is the cheapest subscription that provides it today
# (max → VM); the storefront renders "Requires the Max plan" and gates purchase, the deployer
# warns on a mismatch, and install_odoo.sh/preflight refuse at runtime as a backstop. The lint
# enforces substrate↔min_tier consistency.
requires:
  substrate: vm
  min_tier: max
toolset_contribution: [terminal, execute_code, cron, send_message]   # unioned into the agent
# Brokered tools this Talent needs. host_website / unhost_website / list_hosted_websites are
# platform defaults (the hh-sites gateway plugin, delivered to every box) — declared here so
# the store copy + the lint know the Talent depends on them (they are LIVE, never stubbed).
tools:
  required: [host_website, unhost_website, list_hosted_websites]
delivery: purchased                      # à-la-carte from the Bot Market (not baked into every box)
price: free                              # free during the pilot (Q4: flip to paid at go-live)
# Verify budget: the whole scenario-suite staging run must stay under this measured spend or
# the dev-loop verify holds the Talent for review. OTC = internal credits; tune from runs.
expected_cost_otc: 6.0

# Routing declaration — APPLIED by the index-reconciler, never hand-edited into SOUL. DM-first
# (the native skill index routes DMs to the loaded skill); a group binding is optional.
routing:
  channel: "OtenyWebsiteTalent"
  channel_prompt: |
    You are the owner's OtenyBot, acting as their **WebsiteBot** — you build a real website
    inside this box (Odoo Community) and host it publicly at <slug>.oteny.bot. Refer to
    yourself by your own bot name; the Talent is a capability you're using, not your identity.
    On the FIRST message from a new owner (no ~/.hermes/data/odoo-website/profile.yaml yet), or
    when asked "build me a website" / "put my site online" / "what can you do?", load the
    odoo-website skill (skill_view name='odoo-website') and follow its checklists step by step:
    the one-time INSTALL drill (references/first-run.md) creates the Odoo install; then BUILD
    the site via Odoo's website builder and HOST it with host_website; then ongoing CARE
    (content edits, health). Never improvise shell — run the shipped scripts. The site is
    PUBLIC: confirm with the owner before the first publish, and always give back the URL.
    Reply in the owner's language; keep replies compact and Telegram-friendly.
  signature: "odoo-website"

# Shared identity + this bot's domain memory.
seed_memory: profile/USER.md.template          # -> ~/.hermes/memories/USER.md (identity)
seed_domain_memory: profile/memory.md.template # -> ~/.hermes/data/odoo-website/memory.md
