# Local pre-commit gate — runs the SAME checks CI runs, before a commit lands, so a red
# change (a PII leak, a broken teaser, a failing scenario, a lint violation) never reaches
# main. CI (bundle-tests.yml + talent-lint.yml) is the backstop; this is the fast local
# mirror. Mirrors the hermeshost .pre-commit-config.yaml pattern (repo: local hooks).
#
# Enable once per clone:
#   pip install pre-commit && pre-commit install
# Run on demand against everything:
#   pre-commit run --all-files          # or: python scripts/precommit_checks.py
#
# pytest + pyyaml are installed into pre-commit's own isolated env (additional_dependencies),
# so the gate does not depend on what's in your global Python.
repos:
  - repo: local
    hooks:
      - id: bundle-checks
        name: Bundle tests + scenarios + Talent lints (CI parity)
        entry: python scripts/precommit_checks.py
        language: python
        additional_dependencies: [pytest, pyyaml]
        pass_filenames: false
        always_run: true
        verbose: true
